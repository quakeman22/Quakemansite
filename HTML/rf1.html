<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Real Football - Gameloft</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --md-primary:           #D0BCFF;
      --md-on-primary:        #381E72;
      --md-primary-container: #4F378B;
      --md-on-primary-container: #EADDFF;
      --md-secondary:         #CCC2DC;
      --md-surface:           #141218;
      --md-surface-container-low:  #1D1B20;
      --md-surface-container:      #211F26;
      --md-surface-container-high: #2B2930;
      --md-on-surface:        #E6E1E5;
      --md-on-surface-variant:#CAC4D0;
      --md-outline-variant:   #49454F;
    }

    html, body {
      height: 100%; margin: 0; padding: 0;
      overflow: hidden;
      background: var(--md-surface);
      font-family: 'Google Sans', 'Roboto', sans-serif;
      color: var(--md-on-surface);
    }

    .scroll-container {
      height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: thin;
      scrollbar-color: var(--md-primary) var(--md-surface-container);
    }
    .scroll-container::-webkit-scrollbar { width: 4px; }
    .scroll-container::-webkit-scrollbar-track { background: var(--md-surface-container); }
    .scroll-container::-webkit-scrollbar-thumb { background: var(--md-primary); border-radius: 4px; }

    .list-wrap {
      padding: 8px 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .game-row {
      display: flex;
      align-items: center;
      padding: 10px 14px;
      background: var(--md-surface-container-low);
      border-radius: 12px;
      border: 1px solid var(--md-outline-variant);
      text-decoration: none;
      color: var(--md-on-surface);
      transition: background 0.15s, border-color 0.15s;
      position: relative;
      overflow: hidden;
    }
    .game-row::before {
      content: '';
      position: absolute; inset: 0;
      background: var(--md-primary);
      opacity: 0;
      transition: opacity 0.15s;
      pointer-events: none;
    }
    .game-row:hover::before  { opacity: 0.08; }
    .game-row:active::before { opacity: 0.12; }
    .game-row:hover { border-color: var(--md-primary); }

    .game-thumb {
      width: 52px;
      height: 52px;
      object-fit: contain;
      flex-shrink: 0;
      border-radius: 8px;
      margin-right: 14px;
    }

    .game-info { flex: 1; min-width: 0; }

    .game-name {
      font-weight: 500;
      font-size: 13px;
      color: var(--md-on-surface);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.4;
    }

    .game-vendor {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.4px;
      color: var(--md-primary);
      text-transform: uppercase;
      margin-top: 2px;
      opacity: 0.8;
    }

    .size-chip {
      flex-shrink: 0;
      margin-left: 10px;
      background: var(--md-surface-container-high);
      border: 1px solid var(--md-outline-variant);
      border-radius: 8px;
      padding: 3px 8px;
      font-size: 10px;
      font-weight: 500;
      color: var(--md-on-surface-variant);
      white-space: nowrap;
    }
  </style>
</head>
<body>

  <div class="scroll-container">
    <div class="list-wrap" id="gamesList"></div>
  </div>

  <script>
    const githubApi = 'https://api.github.com/repos/quakeman22/j2metraduzidos/contents/Vendor/GL';

    const manualGames = [
      { title: "Real Football 2005", img: "https://i.imgur.com/gFLwhZg.png" },
      { title: "Real Football 2005", img: "https://i.imgur.com/iNAKYN8.png" },
      { title: "Real Football 2006", img: "https://i.imgur.com/DtECPgV.png" },
      { title: "Real Football 2007", img: "https://media.pocketgamer.com/artwork/na-cyv/rf_2007.jpg" },
      { title: "Real Football 2008", img: "https://i.imgur.com/6jNeoOk.png" },
      { title: "Real Football 2009", img: "https://i.imgur.com/492ZGur.png" },
      { title: "Real Football 2010", img: "https://i.imgur.com/5xHVU5m.jpeg" },
      { title: "Real Football 2011", img: "https://i.imgur.com/sGip2xp.png" },
      { title: "Real Football 2012", img: "https://i.imgur.com/LaevIZL.jpeg" },
      { title: "Real Football 2013", img: "https://i.imgur.com/BpVvKTz.jpeg" },
      { title: "Real Football 2014", img: "https://i.imgur.com/j8XloEI.jpeg" },
      { title: "Real Football 2015", img: "https://images.igdb.com/igdb/image/upload/t_cover_big/co7rko.webp" },
      { title: "Real Football 2016", img: "https://i.imgur.com/waAiBZu.png" },
      { title: "Real Football 2017", img: "https://i.imgur.com/HSFhI13.png" },
      { title: "Real Football 2018", img: "https://i.imgur.com/jkxg36L.jpeg" },
    ];

    const listContainer = document.getElementById('gamesList');
    let githubFiles = [];

    fetch(githubApi)
      .then(res => res.json())
      .then(data => {
        githubFiles = data.filter(item => item.name.toLowerCase().endsWith('.jar'));
        renderList(manualGames);
      })
      .catch(() => renderList(manualGames));

    function renderList(list) {
      listContainer.innerHTML = '';
      list.forEach(game => {
        const fileMatch   = githubFiles.find(f =>
          f.name.toLowerCase().includes(game.title.toLowerCase())
        );
        const downloadUrl = fileMatch ? fileMatch.download_url : '#';
        const fileSize    = fileMatch ? (fileMatch.size / 1024).toFixed(0) + ' KB' : '';

        const row = document.createElement('a');
        row.href      = downloadUrl;
        row.download  = fileMatch ? fileMatch.name : '';
        row.className = 'game-row';

        row.innerHTML = `
          <img src="${game.img}" class="game-thumb" alt="${game.title}"
               onerror="this.src='https://via.placeholder.com/52?text=RF'">
          <div class="game-info">
            <div class="game-name">${game.title}</div>
            <div class="game-vendor">Gameloft</div>
          </div>
          ${fileSize ? `<div class="size-chip">${fileSize}</div>` : ''}
        `;
        listContainer.appendChild(row);
      });
    }
  </script>
</body>
</html>
