<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Real Football - Gameloft</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html, body {
      height: 100%; margin: 0; padding: 0;
      overflow: hidden;
      background: #e4eaf4;
      font-family: Tahoma, Arial, Helvetica, sans-serif;
      color: #000;
    }

    .scroll-container {
      height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: thin;
      scrollbar-color: #84a5c9 #f0f5ff;
    }
    .scroll-container::-webkit-scrollbar { width: 6px; }
    .scroll-container::-webkit-scrollbar-track { background: #f0f5ff; }
    .scroll-container::-webkit-scrollbar-thumb { background: #84a5c9; border-radius: 0; }

    .list-wrap {
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .game-row {
      display: flex;
      align-items: center;
      padding: 10px 12px;
      background: white;
      border-radius: 0;
      border: 1px solid #9eb3cf;
      text-decoration: none;
      color: #000;
    }
    .game-row:hover { background: #f8fbff; border-color: #6a90b9; }

    .game-thumb {
      width: 52px;
      height: 52px;
      object-fit: contain;
      flex-shrink: 0;
      border-radius: 0;
      margin-right: 14px;
      border: 1px solid #9eb3cf;
      background: #e4eaf4;
    }

    .game-info { flex: 1; min-width: 0; }

    .game-name {
      font-weight: bold;
      font-size: 13px;
      color: #0000cc;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.4;
    }

    .game-vendor {
      font-size: 10px;
      font-weight: bold;
      color: #666;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .size-chip {
      flex-shrink: 0;
      margin-left: 10px;
      background: #eef3fc;
      border: 1px solid #d0dbe8;
      border-radius: 0;
      padding: 3px 8px;
      font-size: 10px;
      font-weight: bold;
      color: #2c3e50;
      white-space: nowrap;
    }
  </style>
</head>
<body>

  <div class="scroll-container">
    <div class="list-wrap" id="gamesList"></div>
  </div>

  <script>
    const githubApi = 'https://api.github.com/repos/quakeman22/j2metraduzidos/contents/Vendor/GL';

    const manualGames = [
      { title: "Real Football 2005", img: "https://i.imgur.com/gFLwhZg.png" },
      { title: "Real Football 2005", img: "https://i.imgur.com/iNAKYN8.png" },
      { title: "Real Football 2006", img: "https://i.imgur.com/DtECPgV.png" },
      { title: "Real Football 2007", img: "https://media.pocketgamer.com/artwork/na-cyv/rf_2007.jpg" },
      { title: "Real Football 2008", img: "https://i.imgur.com/6jNeoOk.png" },
      { title: "Real Football 2009", img: "https://i.imgur.com/492ZGur.png" },
      { title: "Real Football 2010", img: "https://i.imgur.com/5xHVU5m.jpeg" },
      { title: "Real Football 2011", img: "https://i.imgur.com/sGip2xp.png" },
      { title: "Real Football 2012", img: "https://i.imgur.com/LaevIZL.jpeg" },
      { title: "Real Football 2013", img: "https://i.imgur.com/BpVvKTz.jpeg" },
      { title: "Real Football 2014", img: "https://i.imgur.com/j8XloEI.jpeg" },
      { title: "Real Football 2015", img: "https://images.igdb.com/igdb/image/upload/t_cover_big/co7rko.webp" },
      { title: "Real Football 2016", img: "https://i.imgur.com/waAiBZu.png" },
      { title: "Real Football 2017", img: "https://i.imgur.com/HSFhI13.png" },
      { title: "Real Football 2018", img: "https://i.imgur.com/jkxg36L.jpeg" },
    ];

    const listContainer = document.getElementById('gamesList');
    let githubFiles = [];

    fetch(githubApi)
      .then(res => res.json())
      .then(data => {
        githubFiles = data.filter(item => item.name.toLowerCase().endsWith('.jar'));
        renderList(manualGames);
      })
      .catch(() => renderList(manualGames));

    function renderList(list) {
      listContainer.innerHTML = '';
      list.forEach(game => {
        const fileMatch   = githubFiles.find(f =>
          f.name.toLowerCase().includes(game.title.toLowerCase())
        );
        const downloadUrl = fileMatch ? fileMatch.download_url : '#';
        const fileSize    = fileMatch ? (fileMatch.size / 1024).toFixed(0) + ' KB' : '';

        const row = document.createElement('a');
        row.href      = downloadUrl;
        row.download  = fileMatch ? fileMatch.name : '';
        row.className = 'game-row';

        row.innerHTML = `
          <img src="${game.img}" class="game-thumb" alt="${game.title}"
               onerror="this.src='https://via.placeholder.com/52?text=RF'">
          <div class="game-info">
            <div class="game-name">${game.title}</div>
            <div class="game-vendor">Gameloft</div>
          </div>
          ${fileSize ? `<div class="size-chip">${fileSize}</div>` : ''}
        `;
        listContainer.appendChild(row);
      });
    }
  </script>
</body>
</html>
