<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Downloads - Jogos Java</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>
    /* ESTILO ORKUT - ADAPTADO PARA CAPAS */
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: transparent;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 12px;
    }

    .scroll-container {
      height: 100%;
      overflow-y: auto;
      padding: 10px;
      scrollbar-width: thin;
      scrollbar-color: #84a5c9 #e4eaf4;
    }

    .scroll-container::-webkit-scrollbar { width: 8px; }
    .scroll-container::-webkit-scrollbar-track { background: #e4eaf4; border-radius: 10px; }
    .scroll-container::-webkit-scrollbar-thumb { background: #84a5c9; border-radius: 10px; }

    .section-title {
      font-size: 14px;
      color: #2c3e50;
      margin: 5px 0 15px 0;
      font-weight: bold;
      border-left: 4px solid #d1136b;
      padding-left: 8px;
      text-transform: uppercase;
    }

    .stats-bar {
      background: #f8faff;
      border: 1px solid #e0e6f0;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .stats-item { display: flex; align-items: center; gap: 8px; color: #2c3e50; }
    .stats-icon { background: #84a5c9; color: white; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; }

    .search-box { margin-bottom: 15px; display: flex; gap: 8px; }
    .search-input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #e0e6f0;
      border-radius: 20px;
      font-size: 12px;
    }
    .search-button {
      background: #84a5c9; color: white; border: none; border-radius: 20px; padding: 0 15px; cursor: pointer;
    }

    .games-list { display: flex; flex-direction: column; gap: 8px; }

    .game-card {
      display: flex;
      align-items: center;
      padding: 10px 15px;
      background: white;
      border: 1px solid #e0e6f0;
      border-radius: 8px;
      text-decoration: none;
      color: inherit;
      transition: transform 0.2s;
    }

    .game-card:hover { border-color: #84a5c9; transform: translateX(5px); background: #f8faff; }

    .game-cover {
      width: 50px;
      height: 50px;
      margin-right: 15px;
      border-radius: 6px;
      object-fit: cover;
      background: #eee;
      border: 1px solid #ddd;
    }

    .game-info { flex: 1; min-width: 0; }
    .game-name { font-weight: bold; font-size: 13px; color: #2c3e50; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .game-meta { font-size: 11px; color: #666; margin-top: 2px; }
    .tag-br { color: #d1136b; font-weight: bold; }

    .download-btn {
      background: #84a5c9; color: white; width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; font-size: 16px;
    }
    .game-card:hover .download-btn { background: #d1136b; }
  </style>
</head>
<body>

  <div class="scroll-container">
    <div class="section-title"></div>
    
    <div class="stats-bar" id="statsBar">
      <div class="stats-item">
        <div class="stats-icon">🎮</div>
        <div id="countText">Carregando catálogo...</div>
      </div>
    </div>

    <div class="search-box">
      <input type="text" class="search-input" id="searchInput" placeholder="Buscar jogo...">
      <button class="search-button" id="searchButton">Buscar</button>
    </div>

    <div id="gamesList" class="games-list"></div>
  </div>

  <script>
    // Configurações baseadas no seu repositório
    const jsonUrl = 'https://raw.githubusercontent.com/quakeman22/j2metraduzidos/main/games.json';
    const downloadBase = 'https://raw.githubusercontent.com/quakeman22/j2metraduzidos/main/Novas%20Tradu%C3%A7%C3%B5es/';

    const list = document.getElementById('gamesList');
    const searchInput = document.getElementById('searchInput');
    const searchButton = document.getElementById('searchButton');
    const countText = document.getElementById('countText');
    
    let allGames = [];

    function renderList(games) {
      list.innerHTML = '';
      if (games.length === 0) {
        list.innerHTML = '<div style="text-align:center; padding:20px;">Nenhum jogo encontrado.</div>';
        return;
      }

      games.forEach(game => {
        const card = document.createElement('a');
        // Usa o cover_url do JSON, se não tiver, usa um placeholder
        const coverImg = game.cover_url || 'https://via.placeholder.com/50?text=Java';
        // Monta o link do arquivo
        card.href = downloadBase + encodeURIComponent(game.filename);
        card.className = 'game-card';
        card.target = "_blank";
        
        card.innerHTML = `
          <img class="game-cover" src="${coverImg}" onerror="this.src='https://via.placeholder.com/50?text=Java'">
          <div class="game-info">
            <div class="game-name">${game.display_name}</div>
            <div class="game-meta">
              <span class="tag-br">🇧🇷 Traduzido</span> | ${game.genero || 'Aventura'}
            </div>
          </div>
          <div class="download-btn">⬇️</div>
        `;
        list.appendChild(card);
      });
      countText.innerHTML = `Total: <b>${games.length}</b> jogos`;
    }

    async function load() {
      try {
        const res = await fetch(`${jsonUrl}?t=${Date.now()}`);
        allGames = await res.json();
        // Ordena por nome de exibição
        allGames.sort((a, b) => a.display_name.localeCompare(b.display_name));
        renderList(allGames);
      } catch (e) {
        countText.innerText = "Erro ao carregar games.json";
      }
    }

    function search() {
      const term = searchInput.value.toLowerCase();
      const filtered = allGames.filter(g => g.display_name.toLowerCase().includes(term));
      renderList(filtered);
    }

    searchButton.onclick = search;
    searchInput.oninput = () => { if(!searchInput.value) renderList(allGames); };
    searchInput.onkeypress = (e) => { if(e.key === 'Enter') search(); };

    load();
  </script>
</body>
</html>
