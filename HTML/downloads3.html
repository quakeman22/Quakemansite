<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Jogoteca J2ME · Downloads</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Tahoma, Arial, Helvetica, sans-serif;
      height: 100vh;
      overflow: hidden;
      color: #000;
      background: #e4eaf4;
    }

    .page-shell {
      height: 100%;
      overflow-y: auto;
      padding: 12px 12px 18px;
      scrollbar-width: thin;
      background: #e4eaf4;
    }

    .page-shell::-webkit-scrollbar {
      width: 6px;
    }
    .page-shell::-webkit-scrollbar-track {
      background: #f0f5ff;
      border-radius: 0;
    }
    .page-shell::-webkit-scrollbar-thumb {
      background: #84a5c9;
      border-radius: 0;
    }

    .search-section {
      margin-bottom: 12px;
      background: white;
      border: 1px solid #9eb3cf;
      padding: 10px;
    }

    .search-container {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .md-input-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      background: white;
      border: 1px solid #a5b9d4;
      border-radius: 0;
      padding: 4px 8px;
    }

    .md-input-wrapper:focus-within {
      border-color: #6a90b9;
    }

    .search-icon {
      color: #84a5c9;
      font-weight: bold;
      margin-right: 8px;
    }

    .md-input-wrapper input {
      border: none;
      background: transparent;
      font-size: 12px;
      font-family: Tahoma, Arial, Helvetica, sans-serif;
      padding: 4px 0;
      width: 100%;
      outline: none;
      color: #000;
    }

    .md-input-wrapper input::placeholder {
      color: #666;
      font-weight: 400;
    }

    .btn-filled {
      background: #84a5c9;
      border: 1px solid #6a90b9;
      padding: 0 14px;
      height: 30px;
      border-radius: 0;
      font-family: Tahoma, Arial, Helvetica, sans-serif;
      font-weight: bold;
      font-size: 11px;
      color: white;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .btn-filled:hover {
      background: #6a90b9;
    }

    .section-title {
      background: #84a5c9;
      color: white;
      display: inline-block;
      padding: 4px 10px;
      margin: 0 0 10px 0;
      border: 1px solid #6a90b9;
      font-size: 12px;
      font-weight: bold;
      text-transform: uppercase;
    }

    .intro-text {
      font-size: 11px;
      color: #555;
      margin-bottom: 10px;
    }

    .games-grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .game-item {
      display: flex;
      align-items: center;
      background: #FFFFFF;
      border-radius: 0;
      padding: 10px;
      text-decoration: none;
      border: 1px solid #9eb3cf;
    }

    .game-item:hover {
      background: #f8fbff;
      border-color: #6a90b9;
    }

    .game-cover-md {
      width: 56px;
      height: 56px;
      border-radius: 0;
      object-fit: cover;
      background: #e4eaf4;
      margin-right: 10px;
      border: 1px solid #9eb3cf;
    }

    .game-info-md {
      flex: 1;
    }

    .game-title {
      font-weight: bold;
      font-size: 12px;
      color: #0000cc;
      margin-bottom: 4px;
    }

    .game-meta-md {
      font-size: 11px;
      color: #555;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .game-meta-md span {
      display: inline-block;
    }

    .empty-state {
      text-align: center;
      padding: 48px 20px;
      background: #FFFFFF;
      border: 1px solid #9eb3cf;
      color: #555;
    }

    .loading-skeleton {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      background: #FFFFFF;
      border-radius: 0;
      border: 1px solid #9eb3cf;
    }

    footer-credit {
      display: block;
      text-align: center;
      font-size: 11px;
      margin-top: 28px;
      color: #666;
    }
  </style>
</head>
<body>

<div class="page-shell">
  <div class="search-section">
    <div class="search-container">
      <div class="md-input-wrapper">
        <span class="search-icon">buscar</span>
        <input type="text" id="searchInput" placeholder="Buscar jogo... Ex: Asphalt, The Sims, Doom" autocomplete="off">
      </div>
      <button class="btn-filled" id="searchButton">
        Buscar
      </button>
    </div>
  </div>

  <div class="section-title">Downloads</div>
  <div class="intro-text">Lista de jogos Java traduzidos e organizados no estilo retrô.</div>

  <div id="gamesContainer" class="games-grid"></div>
  <footer-credit>downloads diretos · repositório de traduções</footer-credit>
</div>

<script>
  // ======================= CONFIGURAÇÕES =======================
  const JSON_URL = 'https://raw.githubusercontent.com/quakeman22/j2metraduzidos/main/games.json';
  const DOWNLOAD_BASE = 'https://raw.githubusercontent.com/quakeman22/j2metraduzidos/main/Novas%20Tradu%C3%A7%C3%B5es/';
  
  // Elementos DOM
  const gamesContainer = document.getElementById('gamesContainer');
  const searchInput = document.getElementById('searchInput');
  const searchBtn = document.getElementById('searchButton');
  
  let allGames = [];        // Catálogo completo
  let currentFiltered = []; // Lista exibida

  // Loading skeletons
  function showLoadingSkeletons() {
    gamesContainer.innerHTML = '';
    for (let i = 0; i < 5; i++) {
      const skeleton = document.createElement('div');
      skeleton.className = 'loading-skeleton';
      skeleton.innerHTML = `
        <div style="width: 56px; height: 56px; background:#dbe7f5; border:1px solid #9eb3cf;"></div>
        <div style="flex:1">
          <div style="width: 70%; height: 12px; background:#dbe7f5; border:1px solid #9eb3cf; margin-bottom: 8px;"></div>
          <div style="width: 40%; height: 10px; background:#dbe7f5; border:1px solid #9eb3cf;"></div>
        </div>
      `;
      gamesContainer.appendChild(skeleton);
    }
  }

  // Escape HTML para segurança
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // Renderização principal
  function renderGameList(gamesArray) {
    gamesContainer.innerHTML = '';
    if (!gamesArray || gamesArray.length === 0) {
      gamesContainer.innerHTML = `
        <div class="empty-state">
          <p style="margin-top: 12px; font-weight: 500;">Nenhum jogo encontrado :(</p>
          <p style="font-size: 0.8rem;">Tente outro nome ou limpe a busca.</p>
        </div>
      `;
      return;
    }

    gamesArray.forEach(game => {
      const cardLink = document.createElement('a');
      cardLink.className = 'game-item';
      const encodedFileName = encodeURIComponent(game.filename);
      const downloadUrl = DOWNLOAD_BASE + encodedFileName;
      cardLink.href = downloadUrl;
      cardLink.target = '_blank';
      cardLink.rel = 'noopener noreferrer';

      let coverUrl = game.cover_url || '';
      const coverValid = coverUrl && (coverUrl.startsWith('http') || coverUrl.startsWith('//'));
      const finalCover = coverValid ? coverUrl : 'https://via.placeholder.com/56?text=J2ME';
      const genero = game.genero || 'Aventura';
      
      cardLink.innerHTML = `
        <img class="game-cover-md" src="${finalCover}" alt="capa" 
             onerror="this.src='https://via.placeholder.com/56?text=Java'">
        <div class="game-info-md">
          <div class="game-title">${escapeHtml(game.display_name)}</div>
          <div class="game-meta-md">
            <span>${escapeHtml(genero)}</span>
            <span>.jar</span>
          </div>
        </div>
      `;
      gamesContainer.appendChild(cardLink);
    });
  }

  // Filtro
  function performSearch() {
    const searchTerm = searchInput.value.trim().toLowerCase();
    if (!searchTerm) {
      currentFiltered = [...allGames];
      renderGameList(currentFiltered);
      return;
    }
    const filtered = allGames.filter(game => 
      game.display_name && game.display_name.toLowerCase().includes(searchTerm)
    );
    currentFiltered = filtered;
    renderGameList(currentFiltered);
  }

  // Reset ao esvaziar input
  function handleInputClear() {
    if (searchInput.value === '') {
      currentFiltered = [...allGames];
      renderGameList(currentFiltered);
    }
  }

  // Carregar JSON
  async function loadGamesCatalog() {
    try {
      showLoadingSkeletons();
      const response = await fetch(`${JSON_URL}?t=${Date.now()}`);
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const gamesData = await response.json();
      if (!Array.isArray(gamesData)) throw new Error('Formato inválido');
      
      allGames = gamesData.sort((a, b) => {
        const nameA = (a.display_name || '').toLowerCase();
        const nameB = (b.display_name || '').toLowerCase();
        return nameA.localeCompare(nameB);
      });
      
      currentFiltered = [...allGames];
      renderGameList(currentFiltered);
    } catch (error) {
      console.error(error);
      gamesContainer.innerHTML = `
        <div class="empty-state" style="background:#FFEDED; border-left: 6px solid #B3261E;">
          <p style="margin-top: 12px; font-weight: 600;">Erro ao carregar a biblioteca</p>
          <p style="font-size: 0.8rem;">Verifique sua conexão ou tente novamente.</p>
          <button id="retryBtn" class="btn-filled" style="margin-top: 16px; background:#5A4694;">
            Recarregar
          </button>
        </div>
      `;
      const retryBtn = document.getElementById('retryBtn');
      if (retryBtn) retryBtn.addEventListener('click', () => loadGamesCatalog());
    }
  }

  // Eventos
  searchBtn.addEventListener('click', (e) => {
    e.preventDefault();
    performSearch();
  });
  searchInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      performSearch();
    }
  });
  searchInput.addEventListener('input', handleInputClear);

  loadGamesCatalog();
</script>
</body>
</html>
