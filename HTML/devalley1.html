<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Lista de Jogos - Devalley</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html, body {
      height: 100%; margin: 0; padding: 0;
      overflow: hidden;
      background: #e4eaf4;
      font-family: Tahoma, Arial, Helvetica, sans-serif;
      font-size: 12px;
      color: #000;
    }

    .scroll-container {
      height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: thin;
      scrollbar-color: #84a5c9 #f0f5ff;
    }
    .scroll-container::-webkit-scrollbar { width: 6px; }
    .scroll-container::-webkit-scrollbar-track { background: #f0f5ff; }
    .scroll-container::-webkit-scrollbar-thumb { background: #84a5c9; border-radius: 0; }

    .list-wrap {
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .game-row {
      display: flex;
      align-items: center;
      padding: 10px 12px;
      background: white;
      border-radius: 0;
      border: 1px solid #9eb3cf;
      text-decoration: none;
      color: #000;
    }
    .game-row:hover { background: #f8fbff; border-color: #6a90b9; }

    .game-thumb {
      width: 39px;
      height: 52px;
      object-fit: contain;
      flex-shrink: 0;
      border-radius: 0;
      margin-right: 14px;
      border: 1px solid #9eb3cf;
      background: #e4eaf4;
    }

    .game-thumb-placeholder {
      width: 52px; height: 52px;
      border-radius: 0;
      background: #e4eaf4;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      margin-right: 14px;
      border: 1px solid #9eb3cf;
    }
    .game-thumb-placeholder span {
      color: #84a5c9;
      font-size: 11px;
    }

    .game-info { flex: 1; min-width: 0; }

    .game-name {
      font-weight: bold;
      font-size: 13px;
      color: #0000cc;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.4;
    }

    .game-vendor {
      font-size: 10px;
      font-weight: bold;
      color: #666;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .size-chip {
      flex-shrink: 0;
      margin-left: 10px;
      background: #eef3fc;
      border: 1px solid #d0dbe8;
      border-radius: 0;
      padding: 3px 8px;
      font-size: 10px;
      font-weight: bold;
      color: #2c3e50;
      white-space: nowrap;
    }

    .error-state {
      padding: 20px 16px;
      color: #555;
      font-size: 12px;
      text-align: center;
      background: white;
      border: 1px solid #9eb3cf;
    }
  </style>
</head>
<body>

  <div class="scroll-container">
    <div class="list-wrap" id="gamesList"></div>
  </div>

  <script>
    const apiUrl = 'https://api.github.com/repos/quakeman22/j2metraduzidos/contents/Vendor/Devalley';
    const list = document.getElementById('gamesList');

    fetch(apiUrl)
      .then(r => r.json())
      .then(data => {
        const jars   = data.filter(i => i.name.toLowerCase().endsWith('.jar'));
        const images = data.filter(i => /\.(png|jpg|jpeg|webp)$/i.test(i.name));
        renderList(jars.sort((a, b) => a.name.localeCompare(b.name)), images);
      })
      .catch(() => { list.innerHTML = '<div class="error-state">Erro ao carregar.</div>'; });

    function renderList(games, images) {
      list.innerHTML = '';
      games.forEach(file => {
        const nameNoExt  = file.name.replace(/\.jar$/i, '');
        const coverFile  = images.find(img => img.name.toLowerCase().startsWith(nameNoExt.toLowerCase()));
        const cleanName  = nameNoExt.replace(/\[.*?\]/g, '').replace(/\(.*?\)/g, '').trim();
        const sizeKB     = (file.size / 1024).toFixed(0);

        const row = document.createElement('a');
        row.href      = file.download_url;
        row.className = 'game-row';

        const thumbHtml = coverFile
          ? `<img src="${coverFile.download_url}" class="game-thumb" alt="${cleanName}">`
          : `<div class="game-thumb-placeholder"><span>J2ME</span></div>`;

        row.innerHTML = `
          ${thumbHtml}
          <div class="game-info">
            <div class="game-name">${cleanName}</div>
            <div class="game-vendor">Devalley Entertainment</div>
          </div>
          <div class="size-chip">${sizeKB} KB</div>
        `;
        list.appendChild(row);
      });
    }
  </script>
</body>
</html>
