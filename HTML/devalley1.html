<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Lista de Jogos - Devalley</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

  <style>
    /* ── M3 Dark Scheme ── */
    :root {
      --md-primary:           #D0BCFF;
      --md-on-primary:        #381E72;
      --md-primary-container: #4F378B;
      --md-on-primary-container: #EADDFF;
      --md-secondary:         #CCC2DC;
      --md-on-secondary:      #332D41;
      --md-surface:           #141218;
      --md-surface-container-low:  #1D1B20;
      --md-surface-container:      #211F26;
      --md-surface-container-high: #2B2930;
      --md-on-surface:        #E6E1E5;
      --md-on-surface-variant:#CAC4D0;
      --md-outline:           #938F99;
      --md-outline-variant:   #49454F;
      --md-state-layer:       rgba(208,188,255,0.08);
      --md-state-layer-hover: rgba(208,188,255,0.12);
    }

    html, body {
      height: 100%; margin: 0; padding: 0;
      overflow: hidden;
      background: var(--md-surface);
      font-family: 'Google Sans', 'Roboto', sans-serif;
      font-size: 14px;
      color: var(--md-on-surface);
    }

    .scroll-container {
      height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: thin;
      scrollbar-color: var(--md-primary) var(--md-surface-container);
    }
    .scroll-container::-webkit-scrollbar { width: 4px; }
    .scroll-container::-webkit-scrollbar-track { background: var(--md-surface-container); }
    .scroll-container::-webkit-scrollbar-thumb { background: var(--md-primary); border-radius: 4px; }

    .list-wrap {
      padding: 8px 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    /* M3 List item */
    .game-row {
      display: flex;
      align-items: center;
      padding: 10px 14px;
      background: var(--md-surface-container-low);
      border-radius: 12px;
      border: 1px solid var(--md-outline-variant);
      text-decoration: none;
      color: var(--md-on-surface);
      transition: background 0.15s, border-color 0.15s;
      position: relative;
      overflow: hidden;
    }
    .game-row::before {
      content: '';
      position: absolute; inset: 0;
      background: var(--md-primary);
      opacity: 0;
      transition: opacity 0.15s;
      pointer-events: none;
    }
    .game-row:hover::before  { opacity: 0.08; }
    .game-row:active::before { opacity: 0.12; }
    .game-row:hover { border-color: var(--md-primary); }

    .game-thumb {
      width: 52px;
      height: 52px;
      object-fit: contain;
      flex-shrink: 0;
      border-radius: 8px;
      margin-right: 14px;
    }

    .game-thumb-placeholder {
      width: 52px; height: 52px;
      border-radius: 8px;
      background: var(--md-surface-container-high);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      margin-right: 14px;
    }
    .game-thumb-placeholder .material-icons-round {
      color: var(--md-primary);
      font-size: 26px;
    }

    .game-info { flex: 1; min-width: 0; }

    .game-name {
      font-weight: 500;
      font-size: 13px;
      color: var(--md-on-surface);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.4;
    }

    .game-vendor {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.4px;
      color: var(--md-primary);
      text-transform: uppercase;
      margin-top: 2px;
    }

    /* M3 Assist chip for size */
    .size-chip {
      flex-shrink: 0;
      margin-left: 10px;
      background: var(--md-surface-container-high);
      border: 1px solid var(--md-outline-variant);
      border-radius: 8px;
      padding: 3px 8px;
      font-size: 10px;
      font-weight: 500;
      color: var(--md-on-surface-variant);
      white-space: nowrap;
    }

    .error-state {
      padding: 20px 16px;
      color: var(--md-on-surface-variant);
      font-size: 13px;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="scroll-container">
    <div class="list-wrap" id="gamesList"></div>
  </div>

  <script>
    const apiUrl = 'https://api.github.com/repos/quakeman22/j2metraduzidos/contents/Vendor/Devalley';
    const list = document.getElementById('gamesList');

    fetch(apiUrl)
      .then(r => r.json())
      .then(data => {
        const jars   = data.filter(i => i.name.toLowerCase().endsWith('.jar'));
        const images = data.filter(i => /\.(png|jpg|jpeg|webp)$/i.test(i.name));
        renderList(jars.sort((a, b) => a.name.localeCompare(b.name)), images);
      })
      .catch(() => { list.innerHTML = '<div class="error-state">Erro ao carregar.</div>'; });

    function renderList(games, images) {
      list.innerHTML = '';
      games.forEach(file => {
        const nameNoExt  = file.name.replace(/\.jar$/i, '');
        const coverFile  = images.find(img => img.name.toLowerCase().startsWith(nameNoExt.toLowerCase()));
        const cleanName  = nameNoExt.replace(/\[.*?\]/g, '').replace(/\(.*?\)/g, '').trim();
        const sizeKB     = (file.size / 1024).toFixed(0);

        const row = document.createElement('a');
        row.href      = file.download_url;
        row.className = 'game-row';

        const thumbHtml = coverFile
          ? `<img src="${coverFile.download_url}" class="game-thumb" alt="${cleanName}">`
          : `<div class="game-thumb-placeholder"><span class="material-icons-round">sports_esports</span></div>`;

        row.innerHTML = `
          ${thumbHtml}
          <div class="game-info">
            <div class="game-name">${cleanName}</div>
            <div class="game-vendor">Devalley Entertainment</div>
          </div>
          <div class="size-chip">${sizeKB} KB</div>
        `;
        list.appendChild(row);
      });
    }
  </script>
</body>
</html>
